<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Pronunciation Guide</title>
    <style>
        :root {
            /* Grok-inspired dark cosmic palette */
            --bg-color: #0a0a0a;
            --surface-color: #121212;
            --card-bg: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --accent: #00eaff;
            --accent-soft: #00b8cc;
            --border-color: rgba(0, 234, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 3rem 1rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(90deg, #ffffff, var(--accent), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        #guide-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1280px;
            align-items: center;
        }

        /* Responsive Grid */
        .phrase-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 24px;
            width: 100%;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.25rem 1.25rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(0, 234, 255, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(0, 234, 255, 0.15);
            border-color: rgba(0, 234, 255, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Typography */
        .character {
            font-size: 5.2rem;
            font-weight: 500;
            line-height: 1;
            margin-bottom: 1rem;
            color: #ffffff;
            transition: transform 0.2s ease;
        }

        .card:hover .character {
            transform: scale(1.08);
        }

        .jyutping {
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .ipa {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.75rem;
            font-family: "Charis SIL", "Doulos SIL", Georgia, serif;
            letter-spacing: 0.5px;
        }

        .play-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 50%;
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: auto;
        }

        .play-btn:hover {
            background: var(--accent);
            color: #0a0a0a;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 234, 255, 0.6);
        }

        .play-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
            margin-left: 3px;
        }

        /* Elegant Divider */
        .divider {
            width: 100%;
            max-width: 680px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-soft), transparent);
            margin: 4.5rem 0 3.5rem;
            opacity: 0.6;
        }

        .loading, .error {
            font-size: 1.15rem;
            color: var(--text-secondary);
            text-align: center;
            padding: 4rem 2rem;
            font-style: italic;
        }

        .error {
            color: #ff6b6b;
        }

        /* Footer credit */
        footer {
            margin-top: 6rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.7;
            text-align: center;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                padding: 2rem 1rem 3rem;
            }
            
            h1 {
                font-size: 2.6rem;
            }
            
            .phrase-row {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 16px;
            }
            
            .card {
                padding: 1.75rem 1rem 1.5rem;
            }
            
            .character {
                font-size: 3.8rem;
            }
            
            .jyutping {
                font-size: 1.15rem;
            }
            
            .play-btn {
                width: 48px;
                height: 48px;
            }
            
            .play-btn svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pronunciation Guide</h1>
        <p class="subtitle">Cantonese • Jyutping • IPA</p>
    </header>

    <div id="guide-container">
        <div class="loading">Connecting to the cosmos... Loading pronunciation data</div>
    </div>

    <footer>
        Elegant redesign • Inspired by curiosity
    </footer>

    <script>
        const sheetId = '1Y6yB_tXm1ETFR7lzqlt7NqgA1EXmuszpn7PSlW4xMzg';
        const gid = '130844584';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

        function getDirectAudioUrl(url) {
            if (!url) return '';
            const fileIdMatch = url.match(/[-\w]{25,}/);
            if (fileIdMatch) {
                return `https://drive.google.com/uc?export=download&id=${fileIdMatch[0]}`;
            }
            return url;
        }

        function parseCSV(str) {
            const result = [];
            let row = [];
            let inQuotes = false;
            let value = '';
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(value.trim());
                    value = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r') continue; 
                    row.push(value.trim());
                    result.push(row);
                    row = [];
                    value = '';
                } else {
                    value += char;
                }
            }
            if (value || row.length > 0) {
                row.push(value.trim());
                result.push(row);
            }
            return result;
        }

        async function fetchAndRenderData() {
            const container = document.getElementById('guide-container');
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const rows = parseCSV(text);
                if (rows.length < 2) {
                    throw new Error("No data found in the sheet.");
                }

                const headers = rows[0].map(h => h.toLowerCase());
                const charIdx = headers.indexOf('character');
                const jyutpingIdx = headers.indexOf('jyutping');
                const ipaIdx = headers.indexOf('ipa');
                const audioIdx = headers.indexOf('audio');

                container.innerHTML = ''; 
                
                let currentPhraseRow = document.createElement('div');
                currentPhraseRow.className = 'phrase-row';
                container.appendChild(currentPhraseRow);
                let activeCardsInRow = 0;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const isBlankRow = !row[charIdx] || row[charIdx].trim() === '';

                    if (isBlankRow) {
                        if (activeCardsInRow > 0) {
                            const divider = document.createElement('div');
                            divider.className = 'divider';
                            container.appendChild(divider);

                            currentPhraseRow = document.createElement('div');
                            currentPhraseRow.className = 'phrase-row';
                            container.appendChild(currentPhraseRow);
                            activeCardsInRow = 0;
                        }
                        continue; 
                    }

                    const char = row[charIdx].trim();
                    const jyutping = row[jyutpingIdx] || '';
                    const ipa = row[ipaIdx] || '';
                    const audioUrl = getDirectAudioUrl(row[audioIdx] || '');

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="character">${char}</div>
                        <div class="jyutping">${jyutping}</div>
                        <div class="ipa">[${ipa}]</div>
                        ${audioUrl ? `
                        <button class="play-btn" aria-label="Play audio for ${char}" onclick="playAudio('${audioUrl}')">
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                        ` : ''}
                    `;
                    
                    currentPhraseRow.appendChild(card);
                    activeCardsInRow++;
                }

                if (activeCardsInRow === 0 && currentPhraseRow && currentPhraseRow.parentNode) {
                    currentPhraseRow.remove();
                    const trailingElement = container.lastElementChild;
                    if (trailingElement && trailingElement.classList.contains('divider')) {
                        trailingElement.remove();
                    }
                }

            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        Unable to load data.<br>Please check Google Sheet permissions.
                    </div>`;
                console.error('Error fetching data:', error);
            }
        }

        let currentAudio = null;
        window.playAudio = function(url) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => {
                console.error("Audio playback failed:", e);
                alert("Audio playback failed. Check browser permissions or Google Drive access.");
            });
        }

        fetchAndRenderData();
    </script>
</body>
</html>
