<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Pronunciation Guide</title>
    <style>
        :root {
            /* Art Song Aesthetic Palette */
            --primary-color: #1a1a1a; /* Deep charcoal almost black */
            --bg-color: #fdfdfd; /* Crisp sheet-music white */
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-muted: #555555;
            --accent-color: #2c2c2c; /* Elegant dark grey for buttons */
            
            /* Desktop Layout Configuration (Reversed Hierarchy) */
            --card-width: 135px; /* Widened slightly to fit large romanization */
            --gap-size: 1rem;
            --char-size: 1.1rem;      /* Smallest */
            --ipa-size: 1.35rem;      /* Medium */
            --jyutping-size: 2.2rem;  /* Largest */
            --btn-size: 44px;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 400;
            color: var(--primary-color);
            margin-bottom: 3rem;
            text-align: center;
            font-size: 2.2rem;
            letter-spacing: 1px;
            font-family: "Georgia", "Times New Roman", serif; /* Elegant serif for header */
        }

        #guide-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1450px;
        }

        /* Desktop Mode: Flex wrapping limited to 10 cards max width */
        .phrase-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--gap-size);
            justify-content: center;
            width: 100%;
            max-width: calc((var(--card-width) * 10) + (var(--gap-size) * 9));
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px; /* Sharper, more classic corners */
            padding: 1.5rem 0.5rem;
            border: 1px solid #eaeaea; /* Subtle border typical of minimalist sites */
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: var(--card-width);
            box-sizing: border-box;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .character {
            font-size: var(--char-size);
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .jyutping {
            font-size: var(--jyutping-size);
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--primary-color);
            word-break: break-all;
            line-height: 1.1;
        }

        .ipa {
            font-size: var(--ipa-size);
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            font-family: "Charis SIL", "Doulos SIL", "Georgia", serif;
            word-break: break-all;
        }

        .play-btn {
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid #cccccc;
            border-radius: 50%;
            width: var(--btn-size);
            height: var(--btn-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto; 
        }

        .play-btn:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        .play-btn svg {
            width: calc(var(--btn-size) * 0.4);
            height: calc(var(--btn-size) * 0.4);
            fill: currentColor;
            margin-left: 3px;
        }

        /* Minimalist phrase separation line */
        .phrase-divider {
            border: none;
            height: 1px;
            background-color: #dddddd;
            width: 100%;
            max-width: 200px;
            margin: 2.5rem auto;
        }

        .loading, .error {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        /* Mobile Viewport Engine */
        @media (max-width: 650px) {
            :root {
                --gap-size: 0.4rem;
                --char-size: 0.9rem;
                --jyutping-size: 1.4rem;
                --ipa-size: 0.95rem;
                --btn-size: 34px;
            }

            body {
                padding: 1.5rem 0.5rem;
            }

            h1 {
                font-size: 1.6rem;
                margin-bottom: 2rem;
            }

            .phrase-row {
                display: grid;
                grid-template-columns: repeat(5, 1fr); 
                max-width: 100%;
                padding: 0 0.25rem;
            }

            .card {
                width: 100%; 
                padding: 1rem 0.15rem;
                border-radius: 6px;
            }
            
            .phrase-divider {
                margin: 1.75rem auto;
                max-width: 100px;
            }
        }
    </style>
</head>
<body>

    <h1>Pronunciation Guide</h1>
    <div id="guide-container">
        <div class="loading">Loading guide from Google Sheets...</div>
    </div>

    <script>
        const sheetId = '1Y6yB_tXm1ETFR7lzqlt7NqgA1EXmuszpn7PSlW4xMzg';
        const gid = '130844584';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

        function getDirectAudioUrl(url) {
            if (!url) return '';
            const fileIdMatch = url.match(/[-\w]{25,}/);
            if (fileIdMatch) {
                return `https://drive.google.com/uc?export=download&id=${fileIdMatch[0]}`;
            }
            return url;
        }

        function parseCSV(str) {
            const result = [];
            let row = [];
            let inQuotes = false;
            let value = '';
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(value.trim());
                    value = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r') continue; 
                    row.push(value.trim());
                    result.push(row);
                    row = [];
                    value = '';
                } else {
                    value += char;
                }
            }
            if (value || row.length > 0) {
                row.push(value.trim());
                result.push(row);
            }
            return result;
        }

        async function fetchAndRenderData() {
            const container = document.getElementById('guide-container');
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const rows = parseCSV(text);
                if (rows.length < 2) {
                    throw new Error("No data found in the sheet.");
                }

                const headers = rows[0].map(h => h.toLowerCase());
                const charIdx = headers.indexOf('character');
                const jyutpingIdx = headers.indexOf('jyutping');
                const ipaIdx = headers.indexOf('ipa');
                const audioIdx = headers.indexOf('audio');

                container.innerHTML = ''; 
                
                let currentPhraseRow = document.createElement('div');
                currentPhraseRow.className = 'phrase-row';
                container.appendChild(currentPhraseRow);
                
                let activeCardsInRow = 0;
                let dividerPending = false;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const isBlankRow = !row[charIdx] || row[charIdx].trim() === '';

                    if (isBlankRow) {
                        if (activeCardsInRow > 0) {
                            dividerPending = true;
                            activeCardsInRow = 0;
                        }
                        continue; 
                    }

                    if (dividerPending) {
                        const divider = document.createElement('hr');
                        divider.className = 'phrase-divider';
                        container.appendChild(divider);
                        
                        currentPhraseRow = document.createElement('div');
                        currentPhraseRow.className = 'phrase-row';
                        container.appendChild(currentPhraseRow);
                        
                        dividerPending = false;
                    }

                    const char = row[charIdx].trim();
                    const jyutping = row[jyutpingIdx] || '';
                    const ipa = row[ipaIdx] || '';
                    const audioUrl = getDirectAudioUrl(row[audioIdx] || '');

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="character">${char}</div>
                        <div class="jyutping">${jyutping}</div>
                        <div class="ipa">[${ipa}]</div>
                        ${audioUrl ? `
                        <button class="play-btn" aria-label="Play audio for ${char}" onclick="playAudio('${audioUrl}')">
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                        ` : ''}
                    `;
                    
                    currentPhraseRow.appendChild(card);
                    activeCardsInRow++;
                }

                if (activeCardsInRow === 0 && currentPhraseRow.childNodes.length === 0) {
                    currentPhraseRow.remove();
                }

            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        Unable to load data. Please ensure the Google Sheet's sharing settings are set to "Anyone with the link can view".
                    </div>`;
                console.error('Error fetching data:', error);
            }
        }

        let currentAudio = null;
        window.playAudio = function(url) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => {
                console.error("Audio playback failed:", e);
                alert("Audio playback failed. The browser might be blocking the audio or the Google Drive file is restricted.");
            });
        }

        fetchAndRenderData();
    </script>
</body>
</html>
